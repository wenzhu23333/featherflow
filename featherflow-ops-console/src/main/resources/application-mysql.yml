spring:
  datasource:
    url: ${FEATHERFLOW_OPS_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/featherflow?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${FEATHERFLOW_OPS_DATASOURCE_USERNAME:root}
    password: ${FEATHERFLOW_OPS_DATASOURCE_PASSWORD:}
    hikari:
      minimum-idle: ${FEATHERFLOW_OPS_DATASOURCE_MIN_IDLE:2}
      maximum-pool-size: ${FEATHERFLOW_OPS_DATASOURCE_MAX_POOL_SIZE:10}
      connection-timeout: ${FEATHERFLOW_OPS_DATASOURCE_CONNECTION_TIMEOUT_MS:30000}
  sql:
    init:
      mode: never

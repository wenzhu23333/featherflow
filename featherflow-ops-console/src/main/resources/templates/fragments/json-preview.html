<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="viewer(title,rawValue)" th:with="emptyValue=${rawValue == null or #strings.isEmpty(rawValue)}">
    <div class="json-preview-widget" th:classappend="${emptyValue ? ' is-empty' : ''}">
        <pre class="cell-block json-preview-block"
             th:classappend="${emptyValue ? ' is-empty' : ''}"
             th:text="${emptyValue ? '-' : rawValue}">json-value</pre>
        <button class="json-preview-open" type="button" th:if="${!emptyValue}"
                title="查看完整内容" aria-label="查看完整内容">+</button>
        <dialog class="json-preview-dialog"
                style="width: min(920px, calc(100vw - 48px)); max-width: calc(100vw - 48px); max-height: min(720px, calc(100vh - 48px)); padding: 0; overflow: hidden;"
                th:if="${!emptyValue}">
            <section class="json-modal-card"
                     style="width: 100%; max-width: 100%; min-width: 0; box-sizing: border-box; overflow: hidden;">
                <header class="json-modal-header">
                    <h3 th:text="${title}">JSON 内容</h3>
                    <button class="json-modal-close" type="button" aria-label="关闭">×</button>
                </header>
                <pre class="json-modal-body"
                     style="display: block; white-space: pre-wrap; overflow-wrap: anywhere; word-break: break-all; word-wrap: break-word; max-width: 100%; min-width: 0; width: 100%; box-sizing: border-box; overflow-x: hidden; overflow-y: auto;"
                     th:text="${rawValue}">json-value</pre>
            </section>
        </dialog>
    </div>
</th:block>

</body>
</html>

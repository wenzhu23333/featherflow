<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="summary(detail)">
    <div class="detail-summary-grid">
        <section class="panel summary-section">
            <div class="panel-header">
                <div>
                    <h2>基础信息</h2>
                    <p>摘要区域每 3 秒自动刷新，便于观察状态变化。</p>
                </div>
            </div>
            <table class="data-table info-table">
                <tbody>
                <tr>
                    <th>Workflow ID</th>
                    <td>
                        <span class="info-value" th:text="${detail.workflowId}">workflow-id</span>
                        <button class="copy-value-button" type="button" th:attr="data-copy-value=${detail.workflowId}" aria-label="复制 Workflow ID" title="复制">
                            <svg viewBox="0 0 16 16" aria-hidden="true">
                                <path d="M5 3h7v9H5z"></path>
                                <path d="M3 5h2v8h6v2H3z"></path>
                            </svg>
                        </button>
                    </td>
                </tr>
                <tr>
                    <th>Biz ID</th>
                    <td>
                        <span class="info-value" th:text="${detail.bizId}">biz-id</span>
                        <button class="copy-value-button" type="button" th:attr="data-copy-value=${detail.bizId}" aria-label="复制 Biz ID" title="复制">
                            <svg viewBox="0 0 16 16" aria-hidden="true">
                                <path d="M5 3h7v9H5z"></path>
                                <path d="M3 5h2v8h6v2H3z"></path>
                            </svg>
                        </button>
                    </td>
                </tr>
                <tr>
                    <th>Workflow 名称</th>
                    <td>
                        <span class="info-value" th:text="${detail.workflowName}">workflow-name</span>
                        <button class="copy-value-button" type="button" th:attr="data-copy-value=${detail.workflowName}" aria-label="复制 Workflow 名称" title="复制">
                            <svg viewBox="0 0 16 16" aria-hidden="true">
                                <path d="M5 3h7v9H5z"></path>
                                <path d="M3 5h2v8h6v2H3z"></path>
                            </svg>
                        </button>
                    </td>
                </tr>
                <tr>
                    <th>启动节点</th>
                    <td>
                        <span class="info-value" th:text="${detail.startNode}">start-node</span>
                        <button class="copy-value-button" type="button" th:attr="data-copy-value=${detail.startNode}" aria-label="复制启动节点" title="复制">
                            <svg viewBox="0 0 16 16" aria-hidden="true">
                                <path d="M5 3h7v9H5z"></path>
                                <path d="M3 5h2v8h6v2H3z"></path>
                            </svg>
                        </button>
                    </td>
                </tr>
                <tr>
                    <th>状态</th>
                    <td>
                        <span class="status-badge"
                              th:classappend="${' status-' + #strings.toLowerCase(detail.workflowStatus)}"
                              th:text="${detail.workflowStatus}">workflow-status</span>
                        <button class="copy-value-button" type="button" th:attr="data-copy-value=${detail.workflowStatus}" aria-label="复制状态" title="复制">
                            <svg viewBox="0 0 16 16" aria-hidden="true">
                                <path d="M5 3h7v9H5z"></path>
                                <path d="M3 5h2v8h6v2H3z"></path>
                            </svg>
                        </button>
                    </td>
                </tr>
                <tr>
                    <th>创建时间</th>
                    <td>
                        <span class="info-value" th:text="${detail.gmtCreatedDisplay}">gmt-created</span>
                        <button class="copy-value-button" type="button" th:attr="data-copy-value=${detail.gmtCreatedDisplay}" aria-label="复制创建时间" title="复制">
                            <svg viewBox="0 0 16 16" aria-hidden="true">
                                <path d="M5 3h7v9H5z"></path>
                                <path d="M3 5h2v8h6v2H3z"></path>
                            </svg>
                        </button>
                    </td>
                </tr>
                <tr>
                    <th>更新时间</th>
                    <td>
                        <span class="info-value" th:text="${detail.gmtModifiedDisplay}">gmt-modified</span>
                        <button class="copy-value-button" type="button" th:attr="data-copy-value=${detail.gmtModifiedDisplay}" aria-label="复制更新时间" title="复制">
                            <svg viewBox="0 0 16 16" aria-hidden="true">
                                <path d="M5 3h7v9H5z"></path>
                                <path d="M3 5h2v8h6v2H3z"></path>
                            </svg>
                        </button>
                    </td>
                </tr>
                <tr>
                    <th>日志中心</th>
                    <td>
                        <a class="log-center-link" th:if="${!#strings.isEmpty(detail.logCenterUrl)}" th:href="${detail.logCenterUrl}" target="_blank" rel="noopener noreferrer">
                            查看日志
                        </a>
                        <span class="log-center-link is-disabled" th:if="${#strings.isEmpty(detail.logCenterUrl)}">暂无链接</span>
                        <button class="copy-value-button" type="button" th:if="${!#strings.isEmpty(detail.logCenterUrl)}" th:attr="data-copy-value=${detail.logCenterUrl}" aria-label="复制日志中心链接" title="复制">
                            <svg viewBox="0 0 16 16" aria-hidden="true">
                                <path d="M5 3h7v9H5z"></path>
                                <path d="M3 5h2v8h6v2H3z"></path>
                            </svg>
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>

        <div class="stacked-panels">
            <section class="panel summary-section" th:attr="data-latest-activity-id=${detail.latestActivityId}">
                <div class="panel-header">
                    <div>
                        <h2>可用操作</h2>
                        <p>根据当前 workflow 状态动态展示可执行动作。</p>
                    </div>
                </div>
                <div class="operation-actions">
                    <th:block th:if="${detail.allowedActions.canTerminate}">
                        <div th:replace="~{fragments/operation-dialog :: directForm(actionPath=@{/workflows/{workflowId}/terminate(workflowId=${detail.workflowId})}, buttonLabel='终止', redirectTo=@{/workflows/{workflowId}(workflowId=${detail.workflowId})}, operationKey='terminate')}">
                        </div>
                    </th:block>
                    <th:block th:if="${detail.allowedActions.canRetry}">
                        <div th:replace="~{fragments/operation-dialog :: directForm(actionPath=@{/workflows/{workflowId}/retry(workflowId=${detail.workflowId})}, buttonLabel='重试', redirectTo=@{/workflows/{workflowId}(workflowId=${detail.workflowId})}, operationKey='retry')}">
                        </div>
                    </th:block>
                    <th:block th:if="${detail.allowedActions.canSkipLatest}">
                        <div th:replace="~{fragments/operation-dialog :: operationForm(actionPath=@{/workflows/{workflowId}/skip(workflowId=${detail.workflowId})}, buttonLabel='跳过最新活动', workflowId=${detail.workflowId}, redirectTo=@{/workflows/{workflowId}(workflowId=${detail.workflowId})}, operationKey='skip')}">
                        </div>
                    </th:block>
                    <span class="muted-text" th:if="${!detail.allowedActions.canTerminate and !detail.allowedActions.canRetry and !detail.allowedActions.canSkipLatest}">
                        当前状态下暂无可执行运维动作
                    </span>
                </div>
            </section>

            <section class="panel summary-section">
                <div class="panel-header">
                    <div>
                        <h2>Workflow 输入</h2>
                        <p>展示 workflow 启动时持久化的原始输入快照。</p>
                    </div>
                </div>
                <div th:replace="~{fragments/json-preview :: viewer('Workflow 输入', ${detail.workflowInput})}"></div>
            </section>
        </div>
    </div>
</th:block>
</body>
</html>

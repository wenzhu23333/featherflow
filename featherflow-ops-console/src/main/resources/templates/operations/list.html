<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>操作历史</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script th:src="@{/js/json-preview.js}" defer></script>
</head>
<body>
<div class="page-shell">
    <header class="page-header">
        <div>
            <p class="page-kicker">FeatherFlow Ops Console</p>
            <h1 class="page-title">操作历史</h1>
            <p class="page-subtitle">查看运维按钮或外部系统写入的 workflow_operation 记录，辅助追踪命令执行情况。</p>
        </div>
        <nav class="page-nav">
            <a class="nav-link" th:href="@{/workflows}">返回 Workflow 列表</a>
        </nav>
    </header>

    <section class="panel filter-panel">
        <div class="panel-header">
            <div>
                <h2>筛选条件</h2>
                <p>操作历史每 5 秒自动刷新，适合观察命令消费状态变化。</p>
            </div>
        </div>
        <form id="operation-filter-form"
              class="filter-grid"
              hx-get="/operations/table"
              hx-target="#operation-history-container"
              hx-swap="innerHTML">
            <div class="field-group">
                <label for="operation-workflow-id">Workflow ID</label>
                <input id="operation-workflow-id" type="text" name="workflowId" placeholder="workflowId" th:value="${workflowId}">
            </div>
            <div class="field-group">
                <label for="operation-biz-id">Biz ID</label>
                <input id="operation-biz-id" type="text" name="bizId" placeholder="bizId" th:value="${bizId}">
            </div>
            <div class="field-group">
                <label for="operation-type">Operation 类型</label>
                <input id="operation-type" type="text" name="operationType" placeholder="operationType" th:value="${operationType}">
            </div>
            <div class="field-group">
                <label for="operation-status">状态</label>
                <input id="operation-status" type="text" name="status" placeholder="status" th:value="${status}">
            </div>
            <div class="field-group">
                <label for="operation-operator">操作人</label>
                <input id="operation-operator" type="text" name="operator" placeholder="operator" th:value="${operator}">
            </div>
            <div class="field-group">
                <label for="operation-created-from">创建时间起</label>
                <input id="operation-created-from" type="text" name="createdFrom" placeholder="yyyy-MM-dd HH:mm:ss" th:value="${createdFrom}">
            </div>
            <div class="field-group">
                <label for="operation-created-to">创建时间止</label>
                <input id="operation-created-to" type="text" name="createdTo" placeholder="yyyy-MM-dd HH:mm:ss" th:value="${createdTo}">
            </div>
            <div class="filter-actions">
                <button type="submit" class="primary-button">筛选</button>
                <a class="secondary-button" th:href="@{/operations}">重置</a>
            </div>
        </form>
    </section>

    <section id="operation-history-container"
             class="panel table-panel"
             hx-get="/operations/table"
             hx-trigger="every 5s"
             hx-include="#operation-filter-form"
             hx-swap="innerHTML">
        <th:block th:replace="~{operations/list-table :: table(${operations},${dateFilterErrors})}"></th:block>
    </section>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="table(workflows,workflowPage,dateFilterErrors)"
          th:with="listRedirectTo=@{/workflows(page=${workflowPage.pagination.page},size=${workflowPage.pagination.size},workflowId=${workflowId},bizId=${bizId},status=${status},workflowName=${workflowName},createdFrom=${createdFrom},createdTo=${createdTo},modifiedFrom=${modifiedFrom},modifiedTo=${modifiedTo})}">
    <input type="hidden" id="workflow-page-input" name="page" th:value="${workflowPage.pagination.page}" hx-swap-oob="true">
    <input type="hidden" id="workflow-size-input" name="size" th:value="${workflowPage.pagination.size}" hx-swap-oob="true">
    <div id="workflow-filter-errors" class="alert" th:if="${dateFilterErrors != null and !dateFilterErrors.isEmpty()}">
        <p>日期筛选输入无效:</p>
        <ul>
            <li th:each="error : ${dateFilterErrors.values()}" th:text="${error}">error</li>
        </ul>
    </div>
    <div class="table-toolbar" th:if="${workflowPage != null}">
        <div>
            <h2>工作流列表</h2>
            <p>默认每页展示 10 条，可按需切换分页大小。</p>
        </div>
        <div class="action-group">
            <div class="pager-summary">
                <span th:text="'第 ' + ${workflowPage.pagination.page} + ' / ' + ${workflowPage.pagination.totalPages} + ' 页'">第 1 / 1 页</span>
                <span th:text="'共 ' + ${workflowPage.pagination.totalElements} + ' 条'">共 0 条</span>
            </div>
            <form id="workflow-page-size-form"
                  class="page-size-form"
                  hx-get="/workflows/table"
                  hx-target="#workflow-list-container"
                  hx-swap="innerHTML">
                <input type="hidden" name="workflowId" th:value="${workflowId}">
                <input type="hidden" name="bizId" th:value="${bizId}">
                <input type="hidden" name="status" th:value="${status}">
                <input type="hidden" name="workflowName" th:value="${workflowName}">
                <input type="hidden" name="createdFrom" th:value="${createdFrom}">
                <input type="hidden" name="createdTo" th:value="${createdTo}">
                <input type="hidden" name="modifiedFrom" th:value="${modifiedFrom}">
                <input type="hidden" name="modifiedTo" th:value="${modifiedTo}">
                <input type="hidden" name="page" value="1">
                <label for="workflow-page-size">每页</label>
                <select id="workflow-page-size" name="size" onchange="this.form.requestSubmit()">
                    <option value="1" th:selected="${workflowPage.pagination.size == 1}">1</option>
                    <option value="5" th:selected="${workflowPage.pagination.size == 5}">5</option>
                    <option value="10" th:selected="${workflowPage.pagination.size == 10}">10</option>
                    <option value="20" th:selected="${workflowPage.pagination.size == 20}">20</option>
                </select>
            </form>
            <div class="pager-links">
                <a th:if="${workflowPage.pagination.hasPrevious}"
                   class="pager-link"
                   th:href="@{/workflows(page=${workflowPage.pagination.previousPage},size=${workflowPage.pagination.size},workflowId=${workflowId},bizId=${bizId},status=${status},workflowName=${workflowName},createdFrom=${createdFrom},createdTo=${createdTo},modifiedFrom=${modifiedFrom},modifiedTo=${modifiedTo})}"
                   th:attr="hx-get=@{/workflows/table(page=${workflowPage.pagination.previousPage},size=${workflowPage.pagination.size},workflowId=${workflowId},bizId=${bizId},status=${status},workflowName=${workflowName},createdFrom=${createdFrom},createdTo=${createdTo},modifiedFrom=${modifiedFrom},modifiedTo=${modifiedTo})}"
                   hx-target="#workflow-list-container"
                   hx-swap="innerHTML">上一页</a>
                <a th:if="${workflowPage.pagination.hasNext}"
                   class="pager-link"
                   th:href="@{/workflows(page=${workflowPage.pagination.nextPage},size=${workflowPage.pagination.size},workflowId=${workflowId},bizId=${bizId},status=${status},workflowName=${workflowName},createdFrom=${createdFrom},createdTo=${createdTo},modifiedFrom=${modifiedFrom},modifiedTo=${modifiedTo})}"
                   th:attr="hx-get=@{/workflows/table(page=${workflowPage.pagination.nextPage},size=${workflowPage.pagination.size},workflowId=${workflowId},bizId=${bizId},status=${status},workflowName=${workflowName},createdFrom=${createdFrom},createdTo=${createdTo},modifiedFrom=${modifiedFrom},modifiedTo=${modifiedTo})}"
                   hx-target="#workflow-list-container"
                   hx-swap="innerHTML">下一页</a>
            </div>
        </div>
    </div>
    <table class="data-table workflow-table">
        <thead>
        <tr>
            <th>Workflow ID</th>
            <th>Biz ID</th>
            <th>Workflow 名称</th>
            <th>状态</th>
            <th>最新活动</th>
            <th>最新失败</th>
            <th>更新时间</th>
            <th>详情</th>
            <th>可用操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="workflow : ${workflows}" th:id="'workflow-row-' + ${workflow.workflowId}">
            <td th:text="${workflow.workflowId}">workflow-id</td>
            <td th:text="${workflow.bizId}">biz-id</td>
            <td th:text="${workflow.workflowName}">workflow-name</td>
            <td>
                <span class="status-badge"
                      th:classappend="${' status-' + #strings.toLowerCase(workflow.workflowStatus)}"
                      th:text="${workflow.workflowStatus}">workflow-status</span>
            </td>
            <td th:text="${workflow.latestActivitySummary}">latest-activity</td>
            <td th:text="${workflow.latestFailureSummary}">latest-failure</td>
            <td th:text="${workflow.gmtModifiedDisplay}">gmt-modified</td>
            <td>
                <a th:href="@{/workflows/{workflowId}(workflowId=${workflow.workflowId})}" class="action-link">查看详情</a>
            </td>
            <td>
                <div class="action-group">
                    <th:block th:if="${workflow.allowedActions.canTerminate}">
                        <div th:replace="~{fragments/operation-dialog :: operationForm(actionPath=|/workflows/${workflow.workflowId}/terminate|, buttonLabel='终止', workflowId=${workflow.workflowId}, redirectTo=${listRedirectTo}, operationKey='terminate')}">
                        </div>
                    </th:block>
                    <th:block th:if="${workflow.allowedActions.canRetry}">
                        <div th:replace="~{fragments/operation-dialog :: operationForm(actionPath=|/workflows/${workflow.workflowId}/retry|, buttonLabel='重试', workflowId=${workflow.workflowId}, redirectTo=${listRedirectTo}, operationKey='retry')}">
                        </div>
                    </th:block>
                    <th:block th:if="${workflow.allowedActions.canSkipLatest}">
                        <div th:replace="~{fragments/operation-dialog :: operationForm(actionPath=|/workflows/${workflow.workflowId}/skip|, buttonLabel='跳过最新活动', workflowId=${workflow.workflowId}, redirectTo=${listRedirectTo}, operationKey='skip')}">
                        </div>
                    </th:block>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</th:block>
</body>
</html>
